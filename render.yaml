services:
  - type: web
    name: damac-cfo-finance-copilot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2
      - key: OPENAI_REALTIME_VOICE
        value: marin
